configuration:
  working_directory: ".ytdl-sub-working-directory"
  ffmpeg_path: "C:/bin/ffmpeg.exe"
  ffprobe_path: "C:/bin/ffprobe.exe"

presets:
  PradoTube:
    preset:
      - "Max 1080p"
      - "Filter Duration"

    download: "{subscription_value}"

    # Output: {subscription_name}/{YYYY-MM}/{video_id}.ext
    output_options:
      output_directory: "{media_directory}/{subscription_name_sanitized}"
      file_name: "{upload_year}-{upload_month_padded}/{uid}.{ext}"
      info_json_name: "{upload_year}-{upload_month_padded}/{uid}.{info_json_ext}"
      thumbnail_name: "{upload_year}-{upload_month_padded}/{uid}.{thumbnail_ext}"
      maintain_download_archive: True

    date_range:
      after: "today-6months"
      before: "now"

    ytdl_options:
      postprocessor_args:
        FFmpegVideoConvertor+ffmpeg_o:
          - "-movflags"
          - "+faststart"

    embed_thumbnail: True

    chapters:
      embed_chapters: True

    subtitles:
      subtitles_name: "{upload_year}-{upload_month_padded}/{uid}.{lang}.{subtitles_ext}"
      subtitles_type: "srt"
      embed_subtitles: True
      languages:
        - "en"
      allow_auto_generated_subtitles: True

    video_tags:
      title: "{title}"
      date: "{upload_date}"
      description: "{webpage_url}"

    overrides:
      media_directory: "E:/Entertainment/PradoTube"
      filter_duration_min_s: 300

    throttle_protection:
      sleep_per_download_s:
        min: 2.0
        max: 8.0
      sleep_per_subscription_s:
        min: 5.0
        max: 12.0
      max_downloads_per_subscription:
        min: 10
        max: 30
